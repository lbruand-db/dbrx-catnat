bundle:
  name: dbrx-catnat

include:
  - resources/*.yml

variables:
  catalog:
    description: |
      Unity Catalog parent catalog for CatNat data. We'd ideally use a top-level
      `catnat` catalog, but the FEVM workspace metastore only grants schema-level
      privileges, so we nest under the workspace-default catalog and prefix all
      schemas with `catnat_`. Swap this to `catnat` on workspaces where we have
      CREATE CATALOG on the metastore.
    default: serverless_stable_po64og_catalog
  warehouse_id:
    description: SQL warehouse used by all SQL notebook tasks.
    default: 1c97ee257092c2b3
  data_size:
    description: |
      `sample` (default — 100/200/30-feature caps per layer) or `full` (national
      dataset). Drives both the fetcher arguments and the bronze input-path
      suffix.
    default: sample

artifacts:
  catnat_wheel:
    type: whl
    path: .
    build: uv build --wheel --out-dir dist

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://fevm-serverless-stable-po64og.cloud.databricks.com
      profile: fevm-stable-po64og

  prod:
    mode: production
    workspace:
      host: https://fevm-serverless-stable-po64og.cloud.databricks.com
      profile: fevm-stable-po64og
    variables:
      data_size: full
