name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uvx ruff check src/ tests/
      - run: uvx ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      # Databricks-dependent tests are tagged with @pytest.mark.databricks
      # and skipped here; CI runs only the workspace-free tests.
      - run: uv run pytest -v --tb=short -m "not databricks"
